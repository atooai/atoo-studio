name: Release

on:
  release:
    types: [published]

jobs:
  # ── npm publish ──
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm publish --provenance --access public

  # ── Docker image (multi-platform) ──
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/atooai/atoo-studio
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── LXC image (attached to release) ──
  lxc:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        if: matrix.arch == 'arm64'

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build LXC image
        run: bash scripts/build-lxc-image.sh "ghcr.io/atooai/atoo-studio:${{ github.event.release.tag_name }}" "${{ matrix.arch }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: atoo-studio-lxc-${{ matrix.arch }}.tar.gz

  # ── Docs (Docusaurus → WebDAV) ──
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Build docs
        run: |
          cd docs
          npm ci
          npm run build

      - name: Deploy to WebDAV
        env:
          WEBDAV_URL: ${{ vars.DOCS_WEBDAV_URL }}
          WEBDAV_USER: ${{ vars.DOCS_WEBDAV_USER }}
          WEBDAV_PASSWORD: ${{ secrets.DOCS_WEBDAV_PASSWORD }}
        run: |
          cd docs/build
          # Create directories first, then upload files
          find . -type d | sort | while read -r dir; do
            curl -sf -u "$WEBDAV_USER:$WEBDAV_PASSWORD" -X MKCOL "$WEBDAV_URL/${dir#./}/" || true
          done
          find . -type f | while read -r file; do
            curl -sf -u "$WEBDAV_USER:$WEBDAV_PASSWORD" -T "$file" "$WEBDAV_URL/${file#./}"
          done
