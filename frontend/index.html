<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VCC — Vibe Coding Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/src/style.css">
<script>
window.addEventListener('error', function(e) {
  if (e.message && e.message.includes('ResizeObserver')) { e.stopImmediatePropagation(); return false; }
});
window.addEventListener('unhandledrejection', function(e) {
  if (e.reason && String(e.reason).includes('ResizeObserver')) { e.preventDefault(); }
});
</script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
